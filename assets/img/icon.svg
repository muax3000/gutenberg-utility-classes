<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#3858e9"/>

  <!-- Margin zone: outer dashed ring -->
  <rect x="9" y="9" width="82" height="82" rx="11"
        fill="none"
        stroke="rgba(255,255,255,0.38)"
        stroke-width="2"
        stroke-dasharray="5.5 3.5"/>

  <!-- Padding zone: semi-transparent filled rectangle -->
  <rect x="20" y="20" width="60" height="60" rx="8"
        fill="rgba(255,255,255,0.18)"/>

  <!-- Content block: solid white -->
  <rect x="31" y="31" width="38" height="38" rx="5"
        fill="white"/>

  <!-- Inner grid: 4 small squares representing blocks/classes -->
  <rect x="36" y="36" width="12" height="12" rx="2" fill="#3858e9" opacity="0.75"/>
  <rect x="52" y="36" width="12" height="12" rx="2" fill="#3858e9" opacity="0.75"/>
  <rect x="36" y="52" width="12" height="12" rx="2" fill="#3858e9" opacity="0.75"/>
  <rect x="52" y="52" width="12" height="12" rx="2" fill="#3858e9" opacity="0.75"/>

</svg>
